<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gunachanthiran — QA Engineer &amp; Automation Architect</title>
<meta name="description" content="QA Engineer, SDET, Automation Architect. Web, Mobile, Desktop and API automation. Enterprise experience at Schneider Electric."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --paper:#F6F4EF;--paper2:#FFFFFF;--paper3:#EFECE5;
  --ink:#0F0F14;--ink2:#252530;--ink3:#56566A;--ink4:#9494A6;--ink5:#C4C4CE;
  --navy:#19285A;--navym:#2A3E8F;--navyp:rgba(25,40,90,0.06);--navyglow:rgba(25,40,90,0.14);
  --rust:#BE4C2C;--rustp:rgba(190,76,44,0.08);
  --green:#287A44;
  --bd:rgba(15,15,20,0.08);--bdh:rgba(15,15,20,0.16);
  --sh1:0 2px 8px rgba(0,0,0,0.06);
  --sh2:0 8px 32px rgba(0,0,0,0.09),0 2px 8px rgba(0,0,0,0.05);
  --sh3:0 20px 60px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.06);
  --shn:0 10px 40px rgba(25,40,90,0.22);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:8px;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --back:cubic-bezier(0.34,1.56,0.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:auto}/* scroll managed by React */
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.7;cursor:none;overflow-x:hidden}
body.no-cursor{cursor:auto}
::selection{background:rgba(25,40,90,0.13)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:2px}

/* ── CURSOR ── */
.cur-dot{position:fixed;z-index:490;pointer-events:none;border-radius:50%;background:var(--navy);transform:translate(-50%,-50%);transition:width .22s var(--ease),height .22s var(--ease),background .22s,opacity .25s,border-radius .22s}
.cur-ring{position:fixed;z-index:489;pointer-events:none;border-radius:50%;border:1px solid rgba(25,40,90,0.2);transform:translate(-50%,-50%);transition:width .42s var(--ease),height .42s var(--ease),border-color .3s,background .3s,opacity .3s;mix-blend-mode:multiply}
.cur-dot.idle,.cur-ring.idle{opacity:0}
.cur-dot.default{width:6px;height:6px;opacity:1}
.cur-ring.default{width:32px;height:32px;opacity:1}
.cur-dot.onlink{width:4px;height:4px;background:var(--rust);opacity:1}
.cur-ring.onlink{width:44px;height:44px;border-color:rgba(190,76,44,0.3);opacity:1}
.cur-dot.onbtn{width:0;height:0;opacity:0}
.cur-ring.onbtn{width:56px;height:56px;background:rgba(25,40,90,0.06);border-color:rgba(25,40,90,0.4);opacity:1}
.cur-dot.ontext{width:2px;height:18px;border-radius:1px;opacity:1}
.cur-ring.ontext{width:0;height:0;opacity:0}
.cur-dot.oncard{width:10px;height:10px;background:var(--navym);opacity:1}
.cur-ring.oncard{width:50px;height:50px;border-color:rgba(25,40,90,0.22);opacity:1}

/* ── PROGRESS ── */
.progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--navy),var(--rust));z-index:9999;transition:width .08s linear;pointer-events:none}

/* ── LAYOUT ── */
.wrap{max-width:1180px;margin:0 auto;padding:0 5.5%}
section{padding:112px 0}
.divider{height:1px;background:var(--bd)}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 5.5%;transition:padding .45s var(--ease),background .4s,box-shadow .4s}
.nav.scrolled{padding:.9rem 5.5%;background:rgba(246,244,239,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 1px 0 var(--bd),0 4px 20px rgba(0,0,0,0.04)}
.nav-logo{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--ink);text-decoration:none;transition:color .2s;cursor:pointer;background:none;border:none;padding:0}
.nav-logo:hover{color:var(--navy)}
.nav-logo em{color:var(--navy);font-style:italic}
.nav-links{list-style:none;display:flex;gap:2.2rem}
.nav-link{font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);background:none;border:none;cursor:pointer;padding:5px 0;position:relative;transition:color .25s,letter-spacing .3s var(--ease)}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--navy);transition:width .3s var(--ease)}
.nav-link:hover,.nav-link.active{color:var(--navy);letter-spacing:.11em}
.nav-link:hover::after,.nav-link.active::after{width:100%}
.nav-hire{font-size:.74rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:var(--navy);color:#fff;padding:.55rem 1.4rem;border-radius:100px;border:none;cursor:pointer;text-decoration:none;transition:background .25s,box-shadow .25s,transform .2s var(--back);box-shadow:0 2px 14px rgba(25,40,90,0.18)}
.nav-hire:hover{background:var(--rust);box-shadow:0 6px 24px rgba(190,76,44,0.28);transform:translateY(-1px)}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--ink);padding:4px}

/* ── MOBILE NAV ── */
.mobile-menu{position:fixed;top:0;left:0;right:0;bottom:0;z-index:450;background:rgba(246,244,239,0.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transform:translateX(100%);transition:transform .5s var(--ease);pointer-events:none}
.mobile-menu.open{transform:translateX(0);pointer-events:all}
.mobile-link{font-family:var(--serif);font-size:2.8rem;font-weight:500;color:var(--ink);background:none;border:none;cursor:pointer;padding:.6rem 0;opacity:0;transform:translateX(30px);transition:color .25s,opacity .4s var(--ease),transform .4s var(--ease)}
.mobile-menu.open .mobile-link{opacity:1;transform:translateX(0)}
.mobile-link:nth-child(1){transition-delay:.05s}
.mobile-link:nth-child(2){transition-delay:.1s}
.mobile-link:nth-child(3){transition-delay:.15s}
.mobile-link:nth-child(4){transition-delay:.2s}
.mobile-link:nth-child(5){transition-delay:.25s}
.mobile-link:nth-child(6){transition-delay:.3s}
.mobile-link:hover{color:var(--navy)}
.mobile-close{position:absolute;top:1.5rem;right:5.5%;background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--ink3)}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:var(--paper)}
.hero-spotlight{position:absolute;inset:0;pointer-events:none;z-index:0;transition:background .15s linear}
.hero-dotgrid{position:absolute;top:0;right:0;width:50%;height:100%;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(25,40,90,0.09) 1px,transparent 1px);background-size:26px 26px;-webkit-mask-image:linear-gradient(to left,rgba(0,0,0,.45) 0%,transparent 72%);mask-image:linear-gradient(to left,rgba(0,0,0,.45) 0%,transparent 72%)}
.hero-bgword{position:absolute;right:1%;bottom:-6%;font-family:var(--serif);font-size:clamp(12rem,21vw,20rem);font-weight:600;color:rgba(25,40,90,0.033);line-height:1;pointer-events:none;user-select:none;letter-spacing:-.03em;z-index:0}
.hero-inner{padding-top:88px;position:relative;z-index:1;max-width:740px}
.hero-badge{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--navym);margin-bottom:2.25rem}
.badge-dot{width:7px;height:7px;border-radius:50%;background:#38C16E;box-shadow:0 0 0 3px rgba(56,193,110,.2);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(56,193,110,.2)}50%{box-shadow:0 0 0 7px rgba(56,193,110,.07)}}
.hero-name{font-family:var(--serif);font-size:clamp(3.6rem,8.5vw,7rem);font-weight:500;line-height:.94;letter-spacing:-.025em;color:var(--ink);margin-bottom:1.75rem}
.hero-name .it{font-style:italic;color:var(--navy)}
.hero-sub{display:flex;flex-wrap:wrap;margin-bottom:2.2rem}
.hero-sub-item{font-size:.76rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding-right:1.2rem;margin-right:1.2rem;border-right:1px solid var(--bdh);line-height:1;transition:color .2s;cursor:default}
.hero-sub-item:last-child{border-right:none}
.hero-sub-item:hover{color:var(--navy)}
.hero-desc{font-size:1.02rem;font-weight:300;color:var(--ink2);max-width:520px;line-height:1.85;margin-bottom:2.75rem}
.hero-desc strong{font-weight:600;color:var(--ink)}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:4.5rem}
.hero-stats{display:flex;padding-top:3rem;border-top:1px solid var(--bd)}
.stat{padding-right:3rem;margin-right:3rem;border-right:1px solid var(--bd);cursor:default}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--serif);font-size:2.8rem;font-weight:500;color:var(--navy);line-height:1;display:inline-block;transition:color .25s,transform .25s var(--back)}
.stat:hover .stat-n{color:var(--rust);transform:scale(1.07)}
.stat-l{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-top:5px}

/* ── BUTTONS ── */
.btn-p{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:.88rem 2.1rem;background:var(--navy);color:#fff;font-family:var(--sans);font-size:.77rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;position:relative;overflow:hidden;transition:box-shadow .3s,transform .2s var(--back);box-shadow:0 2px 12px rgba(25,40,90,0.2);text-decoration:none}
.btn-p .fill{position:absolute;inset:0;background:var(--rust);transform:translateX(-105%);transition:transform .4s var(--ease);border-radius:var(--r)}
.btn-p:hover .fill{transform:translateX(0)}
.btn-p:hover{box-shadow:var(--shn);transform:translateY(-3px)}
.btn-p span{position:relative;z-index:1}
.btn-g{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:.88rem 2.1rem;border:1.5px solid var(--bdh);color:var(--ink2);font-family:var(--sans);font-size:.77rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:transparent;border-radius:var(--r);cursor:pointer;position:relative;overflow:hidden;transition:color .3s,border-color .3s,transform .2s var(--back),box-shadow .3s;text-decoration:none}
.btn-g .fill{position:absolute;inset:0;background:var(--navyp);transform:scaleX(0);transform-origin:left;transition:transform .35s var(--ease)}
.btn-g:hover .fill{transform:scaleX(1)}
.btn-g:hover{border-color:var(--navy);color:var(--navy);transform:translateY(-3px);box-shadow:0 6px 20px rgba(25,40,90,0.1)}
.btn-g span{position:relative;z-index:1}
/* Arrow slides on hover */
.btn-arr{transition:transform .3s var(--ease)}
.btn-p:hover .btn-arr,.btn-g:hover .btn-arr{transform:translate(3px,-3px)}

/* ── SECTION HEADER ── */
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.67rem;letter-spacing:.18em;text-transform:uppercase;color:var(--navym);margin-bottom:1rem}
.eyebrow::before{content:'';width:26px;height:1.5px;background:var(--navym)}
.sec-title{font-family:var(--serif);font-size:clamp(2.5rem,5vw,3.9rem);font-weight:500;line-height:1.06;letter-spacing:-.025em;color:var(--ink);margin-bottom:1.1rem;overflow:hidden}
.sec-title .it{font-style:italic;color:var(--navy)}
.tl{display:block;transition:transform .8s var(--ease),opacity .8s var(--ease)}
.tl.hidden{transform:translateY(100%);opacity:0}
.tl.visible{transform:translateY(0);opacity:1}
.sec-lead{font-size:.96rem;font-weight:300;color:var(--ink3);max-width:520px;line-height:1.85}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:translateY(0)}
.reveal.d1{transition-delay:.1s}
.reveal.d2{transition-delay:.2s}
.reveal.d3{transition-delay:.28s}

/* ── ABOUT ── */
#about{background:var(--paper2)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;margin-top:5rem}
.about-body p{font-size:.97rem;font-weight:300;color:var(--ink2);line-height:1.9;margin-bottom:1.4rem}
.about-body p strong{font-weight:600;color:var(--ink)}
.about-body p .ac{color:var(--navy);font-weight:500}
.bq{border-left:3px solid var(--navy);padding:.8rem 0 .8rem 1.5rem;margin:2.2rem 0;font-family:var(--serif);font-size:1.18rem;font-style:italic;color:var(--ink2);line-height:1.6;position:relative}
.bq::before{content:'';position:absolute;left:-3px;top:0;bottom:100%;width:3px;background:var(--rust);transition:bottom .7s var(--ease)}
.bq.animate::before{bottom:0}
.info-cards{display:flex;flex-direction:column;gap:1.2rem}
.icard{background:var(--paper);border:1px solid var(--bd);border-radius:var(--r);padding:1.6rem 1.75rem;transition:box-shadow .35s var(--ease),border-color .25s,transform .35s var(--ease)}
.icard:hover{box-shadow:var(--sh2);border-color:var(--bdh);transform:translateY(-2px)}
.icard-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--navym);margin-bottom:1rem}
.irow{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;font-size:.85rem;padding:.48rem 0;border-bottom:1px solid var(--bd)}
.irow:last-child{border-bottom:none;padding-bottom:0}
.irow-k{color:var(--ink3)}
.irow-v{color:var(--ink);font-weight:500;text-align:right}
.irow-v.g{color:var(--green)}

/* ── SKILLS ── */
#skills{background:var(--paper)}
.skills-top{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:end;margin-bottom:5rem}
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2.5rem 4rem}
.sg-t{font-family:var(--mono);font-size:.63rem;letter-spacing:.16em;text-transform:uppercase;color:var(--rust);margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.sg-t::after{content:'';flex:1;height:1px;background:var(--bd)}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--bd);border-radius:100px;padding:5px 14px;font-size:.75rem;font-weight:500;color:var(--ink2);background:var(--paper2);letter-spacing:.02em;cursor:default;position:relative;overflow:hidden;transition:color .3s,border-color .3s,background .3s,transform .22s var(--back),box-shadow .3s;user-select:none}
.pill:hover{color:var(--navy);border-color:rgba(25,40,90,.3);background:var(--navyp);transform:translateY(-2px) scale(1.03);box-shadow:0 4px 14px rgba(25,40,90,.1)}
.pill-mark{width:5px;height:5px;border-radius:50%;flex-shrink:0;transition:transform .3s var(--back)}
.pill:hover .pill-mark{transform:scale(1.6)}
.mn{background:var(--navy)}.mr{background:var(--rust)}.mg{background:#38A062}.ms{background:#6474A0}

/* ── EXPERIENCE ── */
#experience{background:var(--paper2)}
.exp-rows{margin-top:5rem}
.exp-row{display:grid;grid-template-columns:200px 1fr;gap:3.5rem;padding:3.5rem 0;border-bottom:1px solid var(--bd);position:relative}
.exp-row:first-child{border-top:1px solid var(--bd)}
.exp-row::before{content:'';position:absolute;left:0;top:0;bottom:100%;width:2px;background:linear-gradient(to bottom,var(--navy),var(--rust));transition:bottom .55s var(--ease)}
.exp-row:hover::before{bottom:0}
.exp-co{font-family:var(--serif);font-size:1.3rem;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:.5rem}
.exp-date{font-family:var(--mono);font-size:.63rem;letter-spacing:.12em;color:var(--navym);margin-bottom:.35rem}
.exp-kind{font-size:.74rem;color:var(--ink4)}
.exp-role{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:.75rem}
.exp-summary{font-size:.91rem;font-weight:300;color:var(--ink3);line-height:1.85;margin-bottom:1.75rem}
.exp-list{list-style:none;display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.exp-list li{display:flex;align-items:flex-start;gap:.85rem;font-size:.87rem;color:var(--ink2);line-height:1.75;padding:.32rem .5rem;border-radius:var(--r);transition:background .2s,padding-left .3s var(--ease)}
.exp-list li:hover{background:var(--navyp);padding-left:.85rem}
.exp-list li::before{content:'';display:block;flex-shrink:0;width:5px;height:1.5px;background:var(--navym);margin-top:12px}
.exp-list li strong{color:var(--ink);font-weight:600}
.exp-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:.63rem;letter-spacing:.06em;color:var(--navym);background:var(--navyp);border:1px solid rgba(25,40,90,.12);padding:3px 10px;border-radius:4px;cursor:default;transition:background .22s,color .22s,transform .2s var(--back)}
.chip:hover{background:var(--navy);color:#fff;transform:translateY(-2px)}

/* ── PROJECTS ── */
#projects{background:var(--paper)}
.proj-list{margin-top:5rem}
.proj-row{display:grid;grid-template-columns:200px 1fr 175px;gap:2.5rem;align-items:center;padding:2.5rem 0;border-bottom:1px solid var(--bd);position:relative;transition:padding-left .3s var(--ease)}
.proj-row:first-child{border-top:1px solid var(--bd)}
.proj-row::before{content:'';position:absolute;left:-5.5%;right:-5.5%;top:0;bottom:0;background:linear-gradient(135deg,var(--navyp),rgba(190,76,44,.025));opacity:0;border-radius:var(--r);transition:opacity .4s var(--ease);pointer-events:none}
.proj-row:hover::before{opacity:1}
.proj-row:hover{padding-left:.6rem}
.proj-n{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;color:var(--ink4);margin-bottom:.4rem;transition:color .25s}
.proj-row:hover .proj-n{color:var(--navym)}
.proj-name{font-family:var(--serif);font-size:1.28rem;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:.32rem;transition:color .25s}
.proj-row:hover .proj-name{color:var(--navy)}
.proj-dom{font-size:.71rem;color:var(--ink4);letter-spacing:.06em}
.proj-desc{font-size:.875rem;font-weight:300;color:var(--ink3);line-height:1.85}
.proj-desc strong{font-weight:600;color:var(--ink2)}
.proj-right{display:flex;flex-direction:column;gap:.75rem;align-items:flex-end}
.proj-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);border:1px solid rgba(25,40,90,.25);padding:7px 14px;border-radius:var(--r);background:var(--paper2);cursor:pointer;text-decoration:none;overflow:hidden;position:relative;transition:color .3s,border-color .3s,transform .2s var(--back),box-shadow .3s}
.proj-btn .fill{position:absolute;inset:0;background:var(--navy);transform:translateY(105%);transition:transform .35s var(--ease)}
.proj-btn:hover{color:#fff;border-color:var(--navy);transform:translateY(-2px);box-shadow:var(--shn)}
.proj-btn:hover .fill{transform:translateY(0)}
.proj-btn span,.proj-btn .arr{position:relative;z-index:1}
.proj-btn .arr{transition:transform .3s var(--ease)}
.proj-btn:hover .arr{transform:translate(3px,-3px)}
.proj-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}
.pt{font-family:var(--mono);font-size:.58rem;letter-spacing:.05em;color:var(--ink4);padding:2px 8px;border-radius:3px;background:var(--paper3);border:1px solid var(--bd);transition:background .2s,color .2s,transform .18s var(--back)}
.pt:hover{background:var(--navyp);color:var(--navym);transform:translateY(-1px)}

/* ── LEARNING ── */
#learning{background:var(--paper2)}
.learn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:4.5rem}

/* ── SMOOTH SCROLL ── */
function scrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.pageYOffset - 78;
  window.scrollTo({ top, behavior: 'smooth' });
}

/* ── CURSOR ── */
function Cursor() {
  const dotRef  = useRef(null);
  const ringRef = useRef(null);
  const [state, setState] = useState('idle');
  const mx = useRef(-200), my = useRef(-200);
  const rx = useRef(-200), ry = useRef(-200);
  const rafId = useRef(null);

  useEffect(() => {
    const onMove = e => {
      mx.current = e.clientX;
      my.current = e.clientY;
      if (dotRef.current) {
        dotRef.current.style.left = e.clientX + 'px';
        dotRef.current.style.top  = e.clientY + 'px';
      }
      setState(s => s === 'idle' ? 'default' : s);
    };
    const onLeave = () => setState('idle');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseleave', onLeave);

    // Ring animation loop
    const loop = () => {
      rx.current += (mx.current - rx.current) * 0.13;
      ry.current += (my.current - ry.current) * 0.13;
      if (ringRef.current) {
        ringRef.current.style.left = rx.current + 'px';
        ringRef.current.style.top  = ry.current + 'px';
      }
      rafId.current = requestAnimationFrame(loop);
    };
    rafId.current = requestAnimationFrame(loop);

    // Delegate cursor states
    const handlers = [];
    const add = (sel, enter, leave) => {
      document.querySelectorAll(sel).forEach(el => {
        const h1 = () => setState(enter);
        const h2 = () => setState(leave || 'default');
        el.addEventListener('mouseenter', h1);
        el.addEventListener('mouseleave', h2);
        handlers.push({ el, h1, h2 });
      });
    };
    add('.btn-p,.btn-g,.nav-hire,.proj-btn', 'onbtn');
    add('a:not(.btn-p):not(.btn-g):not(.proj-btn),.pill,.chip,.role-tag,.nav-link,.foot-link', 'onlink');
    add('.about-body p,.exp-summary,.proj-desc,.hero-desc,.contact-body', 'ontext');
    add('[data-tilt]', 'oncard');

    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseleave', onLeave);
      cancelAnimationFrame(rafId.current);
      handlers.forEach(({ el, h1, h2 }) => {
        el.removeEventListener('mouseenter', h1);
        el.removeEventListener('mouseleave', h2);
      });
    };
  }, []);

  return <>
    <div ref={dotRef}  className={`cur-dot  ${state}`} />
    <div ref={ringRef} className={`cur-ring ${state}`} />
  </>;
}

/* ── PROGRESS BAR ── */
function ProgressBar() {
  const [w, setW] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const dh = document.documentElement.scrollHeight - window.innerHeight;
      setW(dh > 0 ? (window.pageYOffset / dh * 100) : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="progress" style={{ width: w + '%' }} />;
}

/* ── TILT CARD ── */
function TiltCard({ children, className }) {
  const ref = useRef(null);
  const onMove = e => {
    const r = ref.current.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width/2)  / (r.width/2);
    const dy = (e.clientY - r.top  - r.height/2) / (r.height/2);
    ref.current.style.transform = `perspective(800px) rotateX(${dy*-7}deg) rotateY(${dx*7}deg) scale(1.02)`;
    ref.current.style.boxShadow = `0 ${8+Math.abs(dy*7)}px ${24+Math.abs(dx*7)*2}px rgba(25,40,90,0.12)`;
  };
  const onLeave = () => {
    ref.current.style.transform = '';
    ref.current.style.boxShadow = '';
  };
  return <div ref={ref} data-tilt className={className} onMouseMove={onMove} onMouseLeave={onLeave}>{children}</div>;
}

/* ── MAGNETIC BUTTON ── */
function MagBtn({ children, className, onClick, href, target }) {
  const ref = useRef(null);
  const onMove = e => {
    const r = ref.current.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width/2)  * 0.22;
    const dy = (e.clientY - r.top  - r.height/2) * 0.22;
    ref.current.style.transform = `translate(${dx}px,${dy}px)`;
  };
  const onLeave = () => { ref.current.style.transform = ''; };
  const Tag = href ? 'a' : 'button';
  return <Tag ref={ref} className={className} onMouseMove={onMove} onMouseLeave={onLeave}
    onClick={onClick} href={href} target={target} rel={target ? 'noopener' : undefined}>
    {children}
  </Tag>;
}

/* ── REVEAL ── */
function useReveal(threshold = 0.1) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ── TITLE LINE ── */
function TitleLine({ children }) {
  const [ref, vis] = useReveal(0.3);
  return <span ref={ref} className={`tl ${vis ? 'visible' : 'hidden'}`}>{children}</span>;
}

/* ── COUNTER ── */
function Counter({ to, suffix='', text }) {
  const [val, setVal] = useState(0);
  const [started, setStarted] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setStarted(true); }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  useEffect(() => {
    if (!started) return;
    if (text) { setTimeout(() => setVal(text), 400); return; }
    let start; const dur = 1200;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(e * to) + suffix);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [started]);
  return <div ref={ref} className="stat-n">{val || (text ? '—' : '0')}</div>;
}

/* ── PROGRESS BAR CARD ── */
function LCard({ item, delay }) {
  const [ref, vis] = useReveal(0.4);
  const [started, setStarted] = useState(false);
  useEffect(() => { if (vis) setStarted(true); }, [vis]);
  return (
    <div ref={ref} className={`lcard reveal ${vis ? 'in' : ''}`} style={{ transitionDelay: delay }}>
      <div className="lcard-n">0{item.n} — In Progress</div>

      </div>
      <div className="prog-lbl"><span>In Progress</span><span>{item.pct}%</span></div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [activeSection, setActiveSection] = useState('hero');
  const [mobileOpen, setMobileOpen] = useState(false);

  // Active nav via scroll
  useEffect(() => {
    const all = ['hero', ...NAV_ITEMS];
    const onScroll = () => {
      let cur = 'hero';
      all.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top - 120 <= 0) cur = id;
      });
      setActiveSection(cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return <>
    <ProgressBar />
    <Cursor />
    <Nav active={activeSection} mobileOpen={mobileOpen} setMobile={setMobileOpen} />
    <main>
      <Hero />
      <div className="divider" />
      <About />
      <div className="divider" />
      <Skills />
      <div className="divider" />
      <Experience />
      <div className="divider" />
      <Projects />
      <div className="divider" />
      <Learning />
      <div className="divider" />
      <Certs />
      <div className="divider" />
      <Contact />
    </main>
    <footer>
      <button className="foot-brand" onClick={() => scrollTo('hero')}>Guna<em>chanthiran</em></button>
      <div className="foot-copy">&copy; {new Date().getFullYear()} &mdash; QA Engineer &amp; Automation Architect</div>
      <nav className="foot-links">
        <a className="foot-link" href={LINKEDIN} target="_blank" rel="noopener">LinkedIn</a>
        <a className="foot-link" href={GITHUB}   target="_blank" rel="noopener">GitHub</a>
        <a className="foot-link" href={`mailto:${EMAIL}`}>Email</a>
      </nav>
    </footer>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
